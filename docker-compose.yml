# FinBrain 上市公司财报智能问数系统 - Docker Compose 配置
name: finbrain-financial-report

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: finbrain_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-financial_report}
      MYSQL_USER: ${MYSQL_USER:-fin_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fin_pass123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - finbrain_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FinBrain 主应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finbrain_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-financial_report}
      DB_USER: ${MYSQL_USER:-fin_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fin_pass123}
      # LLM API 配置
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      # 时区
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      # 挂载项目目录（开发模式热重载）
      - .:/app
      # 挂载数据目录
      - ./data:/app/data
      - ./result:/app/result
      - ./logs:/app/logs
      - ./processed:/app/processed
    working_dir: /app
    command: >
      bash -c "
        streamlit run app.py --server.port=8501 --server.address=0.0.0.0
      "
    networks:
      - finbrain_network

  # FinBrain 命令行工具（一次性运行流水线）
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finbrain_pipeline
    profiles:
      - pipeline
    depends_on:
      - mysql
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-financial_report}
      DB_USER: ${MYSQL_USER:-fin_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fin_pass123}
      # LLM API 配置
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    volumes:
      - .:/app
      - ./result:/app/result
      - ./processed:/app/processed
    command: >
      python src/main.py
      --data-dir /app/B 题 - 示例数据/示例数据
      --output-dir /app/result
    networks:
      - finbrain_network

networks:
  finbrain_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
